  - id: "temporal_comparison_classification"
    description: "Utilize comparisons with previous reports to improve classification accuracy."
    text: |
      # Instruction:
      Classify the radiology report into one of six categories: "stable", "romets", "progression", "no", "mets", "improved".

      # Label Descriptions:
