          - ‘improved'
              - a state of improvement in cancer
              - If the size or condition of the cancer improves
          - 'romets'
              - a state of reduced transition
              - If the original metastatic cancer is reduced

      # Contextual Focus:
      Concentrate on understanding the overall context of the report. If the patient's condition suggests stability without signs of deterioration, consider "stable." If there is evidence of disease spread, "mets" might be appropriate.

      # Key Indicators:
          - Look for descriptions indicating no change, disease spread, improvement, or worsening.
          - Pay attention to the overall tone and language used in the "Conclusion" and "Impression" sections.

      # Decision Point:
      Use the broader clinical picture to inform the final classification, rather than relying solely on specific phrases.

      # Radiology report:
      {report}

