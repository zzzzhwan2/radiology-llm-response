prompts:
  - id: "comprehensive_radiology_classification"
    description: "Classify the radiology report into one of six categories based on the detailed analysis of the provided sections."
    text: |
      ### Instruction ###
      Classify the radiology report into one of six categories: "stable", "romets", "progression", "no", "mets", "improved".
      - Description of six labels:
          - 'no'
              - a state of being unresponsive to treatment
              - May mean cancer remains intact or remains unchanged
          - 'mets'
              - a state in which a transition has occurred
              - If the cancer has spread from its original location to another site
          - 'progression'
              - a state of progression of cancer
              - If the cancer has grown or worsened
          - 'stable'
              - a stable condition of cancer
              - If the cancer is no longer progressing and remains in place
          - ‘improved'
              - a state of improvement in cancer
              - If the size or condition of the cancer improves
          - 'romets'
              - a state of reduced transition
              - If the original metastatic cancer is reduced

      - Steps:
          1. Focus on the "Conclusion" and "Impression" sections to determine the primary category.
          2. Refer to the "Findings" section for additional context if the classification is unclear.
          3. Look for key phrases like "no evidence," "metastasis," "progression," "stable," "improved," and "reduced" to help guide your classification.
          4. Provide the final classification as one of the six categories.

      ### Radiology report ###
      {report}

  - id: "contextual_emphasis_classification"
    description: "Enhance classification accuracy by focusing on the broader context of the patient's condition."
    text: |
      # Instruction:
      Classify the radiology report into one of six categories: "stable", "romets", "progression", "no", "mets", "improved".

      # Label Descriptions:
          - 'no'
