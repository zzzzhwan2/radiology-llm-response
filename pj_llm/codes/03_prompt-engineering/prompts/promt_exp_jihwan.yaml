                ("improved","a state of improvement in cancer; If the size or condition of the cancer improves"),
                ("romets","a state of reduced transition; If the original metastatic cancer is reduced")
                ]
        </Label_Description>

        <Instruction>
        ### Based on the report below, classify a cancer treatment response into one of six labels: 'improved', 'mets', 'no', 'progression', 'romets', 'stable'.
        def classify_labels_of_cancer_treatement(radiology_report:str) -> str:
            """
            - You are a radiologist who must classify a label of the radiology_report, which is a cancer treatement response of each patient.
            - If you classify the label accurately, patients will have a very precious opportunity to continue their lives again, so that they can regain their happiness and hope.
            - Let's think step by step to classify labels accurately.
            1. Focus on the "Conclusion" section for primary classification.
            2. If needed, refer to the "Findings" section for additional context.
            3. Ignore sections that do not contribute to the classification, such as patient history.
            4. Pay special attention to key terms indicating the patient's condition, such as "stable," "metastasis," "progression," "no evidenfinal," "improved," and similar phrases.
            5. Provide final_the classification output only. Don't verbose. Thanks for your cooperation.
            
            Parameters: 
                    radiology_report (str): input sentence which is a radiology_report of real patient.
            
            Returns: 
                    str: label of the input 
            """

            # classify the label
            if "No evidence" in radiology_report or "No remarkable change" in radiology_report:
                return "no"
            elif "metastases" in radiology_report or "metastasis" in radiology_report:
                return "mets"
            elif "progression" in radiology_report or "increased size of" of "Newly developed" in radiology_report:
                return "progression"
            elif "no chance of" in radiology_report or "stable" or "Stable disease" or "Similar size" in radiology_report:
                return "stable"
            elif "improvement" in radiology_report or "improved" in radiology_report:
                return "improved"
            else:
                return "romets"
        </Instruction>
                        
        <Example>
        ### Example of label-classification.
        >>> classify_labels_of_cancer_treatement(
                """
                Clinical information : hepatocellular carcinoma, s/p RTx to C1 (2018-12-19 ~ 2019-01-08, from outside hospital).    
                Compared with previous MR scanned on 2021-05-28. 
                Findings :   
                Similar size of enhancing left lateral mass of C1.  
