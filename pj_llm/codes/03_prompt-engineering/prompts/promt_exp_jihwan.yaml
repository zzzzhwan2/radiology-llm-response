prompts:
    - id: 'Pythonic promt with one-shot example'
      description: "Description 딕셔너리 생성, 함수 안에 instruction 포함, 공손한 말투 적용, 1-shot example, classification 유도하기, 단순 label만 추출하도록 함"
      text: |
        """
        <Label_Description>
        ### Below is a python list which consists of tuples as elements. Index 0 of each tuple has a label of cancer treatement response in Radiology, and index 1 has a description of the label.
        label_list = [
                ("no","a state of being unresponsive to treatment; May mean cancer remains intact or remains unchanged"),
                ("mets","a state in which a transition has occurred; If the cancer has spread from its original location to another site"),
                ("progression","a state of progression of cancer; If the cancer has grown or worsened"),
                ("stable","a stable condition of cancer; If the cancer is no longer progressing and remains in place"),
                ("improved","a state of improvement in cancer; If the size or condition of the cancer improves"),
                ("romets","a state of reduced transition; If the original metastatic cancer is reduced")
                ]
        </Label_Description>

        <Instruction>
        ### Based on the report below, classify a cancer treatment response into one of six labels: 'improved', 'mets', 'no', 'progression', 'romets', 'stable'.
        def classify_labels_of_cancer_treatement(radiology_report:str) -> str:
            """
            - You are a radiologist who must classify a label of the radiology_report, which is a cancer treatement response of each patient.
            - If you classify the label accurately, patients will have a very precious opportunity to continue their lives again, so that they can regain their happiness and hope.
            - It would be pleasure to think step by step by focusing on the key terms in the "Conclusion" and "Impression" section of the radiology_report. for example, if the report mentions "no evidence of disease progression," classify as "no"
            - Please classify the radiology_report into one of six labels: 'no', 'mets', 'progression', 'stable', 'improved', or 'romets'.
            - Please don't verbose, just response the one label.

            Parameters: 
                    radiology_report (str): input sentence which is a radiology_report of real patient.
            
            Returns: 
                    str: label of the input 
            """

            # classify the label
            if radiology_report is "no":
                    return "no"
            elif radiology_report is "mets":
                    return "mets"
            elif radiology_report is "progression":
                    return "progression"
            elif radiology_report is "stable":
                    return "stable"
            elif radiology_report is "improved":
                    return "improved"
            else:
                    return "romets"
        </Instruction>
                        
        <Example>
        ### Example of label-classification.
        >>> classify_labels_of_cancer_treatement(
                """
                Clinical information : hepatocellular carcinoma, s/p RTx to C1 (2018-12-19 ~ 2019-01-08, from outside hospital).    
            Compared with previous MR scanned on 2021-05-28. 
            Findings :   
            Similar size of enhancing left lateral mass of C1.  
            No other enhancing soft tissue lesion or bone marrow replacing lesion.  
            Impression :  
            Similar size of metastatic lesion in C1, left lateral region.  
            Recommendation :   
            Clinical correlation and follow up.
                """
                )
        "stable"
        </Example>	

        <report>
        {report}
        </report>

        <Output>
        label = classify_labels_of_cancer_treatement(report).lower()
        
        ### Response Format
        f"""
        (label)
        """
        </Output>
        """
        
        
